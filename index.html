<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Garoinha - Previsão leve e certeira" />
    <title>🌧️ Garoinha - Previsão do Tempo</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
  </head>
  <body>
    <div class="container">
      <!-- Header -->
      <header class="header">
        <div class="header-content">
          <h1 class="logo"><i class="ph-fill ph-cloud-rain"></i> Garoinha</h1>
          <p class="tagline">Previsão leve e certeira</p>
        </div>
        <div class="header-controls">
          <button id="unitToggle" class="control-btn" aria-label="Alternar Unidade (°C/°F)">°C</button>
          <button id="themeToggle" class="control-btn" aria-label="Alternar Tema Escuro"><i class="ph-fill ph-moon"></i></button>
        </div>
      </header>

      <!-- Search Section -->
      <section class="search-section">
        <div class="search-wrapper">
          <input
            type="text"
            id="cityInput"
            class="search-input"
            placeholder="Digite o nome da cidade..."
            autocomplete="off"
          />
          <button id="searchBtn" class="search-btn">
            <i class="ph ph-magnifying-glass search-icon"></i>
            Buscar
          </button>
        </div>

        <!-- Autocomplete -->
        <div id="autocomplete" class="autocomplete hidden"></div>
      </section>

      <!-- Skeleton Loading -->
      <div id="loading" class="skeleton-container hidden">
        <div class="skeleton-header">
          <div class="skeleton-title"></div>
          <div class="skeleton-subtitle"></div>
        </div>
        <div class="skeleton-main">
          <div class="skeleton-icon"></div>
          <div class="skeleton-temp"></div>
          <div class="skeleton-desc"></div>
        </div>
        <div class="skeleton-details">
          <div class="skeleton-item"></div>
          <div class="skeleton-item"></div>
          <div class="skeleton-item"></div>
          <div class="skeleton-item"></div>
        </div>
        <div class="skeleton-forecast"></div>
      </div>

      <!-- Error Message -->
      <div id="error" class="error hidden">
        <i class="ph-fill ph-warning-circle error-icon"></i>
        <p id="errorMessage"></p>
      </div>

      <!-- Weather Card -->
      <div id="weatherCard" class="weather-card hidden">
        <!-- Location -->
        <div class="weather-header">
          <h2 id="cityName" class="city-name"></h2>
          <p id="country" class="country"></p>
        </div>

        <!-- Main Weather Info -->
        <div class="weather-main">
          <div class="temperature-container">
            <span id="weatherIcon" class="weather-icon-large"></span>
            <div class="temperature-info">
              <h3 id="temperature" class="temperature"></h3>
              <p id="weatherDesc" class="weather-desc"></p>
            </div>
          </div>
          <p id="feelsLike" class="feels-like"></p>
        </div>

        <!-- Weather Details -->
        <div class="weather-details">
          <div class="detail-item">
            <i class="ph-fill ph-drop detail-icon"></i>
            <div class="detail-info">
              <p class="detail-label">Umidade</p>
              <p id="humidity" class="detail-value"></p>
            </div>
          </div>

          <div class="detail-item">
            <i class="ph-fill ph-wind detail-icon"></i>
            <div class="detail-info">
              <p class="detail-label">Vento</p>
              <p id="windSpeed" class="detail-value"></p>
            </div>
          </div>

          <div class="detail-item">
            <i class="ph-fill ph-thermometer detail-icon"></i>
            <div class="detail-info">
              <p class="detail-label">Pressão</p>
              <p id="pressure" class="detail-value"></p>
            </div>
          </div>

          <div class="detail-item">
            <i class="ph-fill ph-cloud detail-icon"></i>
            <div class="detail-info">
              <p class="detail-label">Nuvens</p>
              <p id="cloudCover" class="detail-value"></p>
            </div>
          </div>
        </div>

        <!-- 7-Day Forecast -->
        <div class="forecast-section">
          <h3 class="forecast-title">Próximos 7 dias</h3>
          <div id="forecastContainer" class="forecast-container"></div>
        </div>

        <!-- Last Update -->
        <div class="weather-footer">
          <p id="lastUpdate" class="last-update"></p>
        </div>
      </div>

      <!-- Footer -->
      <footer class="footer">
        <p>Desenvolvido com ☕ e 🌧️ no Brasil</p>
        <p class="api-credit">
          Dados:
          <a href="https://open-meteo.com/" target="_blank">Open-Meteo</a>
        </p>
      </footer>
    </div>

    <!-- Scripts -->
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/api.js"></script>
    <script src="js/weather.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
    <script src="js/debug-helper.js"></script>
  </body>
</html>
